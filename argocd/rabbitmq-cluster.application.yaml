apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rabbitmq
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/roelvandegrint/k3s.infrastructure
    targetRevision: rabbitmq
    path: rabbitmq-cluster

  destination:
    server: https://kubernetes.default.svc
    namespace: rabbitmq
