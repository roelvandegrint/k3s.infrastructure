apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo
  namespace: argocd
spec:
  project: default
  destination:
    namespace: kargo
    server: https://kubernetes.default.svc
  sources:
    - repoURL: ghcr.io/akuity/kargo-charts
      chart: kargo
      targetRevision: 1.8.3
      helm:
        valuesFiles:
          - $values/kargo/helm/values.yaml

    - repoURL: https://github.com/roelvandegrint/k3s.infrastructure.git
      targetRevision: implement_kargo
      ref: values

    - repoURL: https://github.com/roelvandegrint/k3s.infrastructure.git
      targetRevision: implement_kargo
      path: kargo/kustomize/overlays/k3s

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
